<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Authentication | Prompt Gallery</title>
    <link rel="icon" type="image/jpeg" href="/src/assets/images/site_logo_1781200506583.jpg" />
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="bg-[#0F0F12] text-[#F3F4F6] min-h-full flex items-center justify-center p-4 antialiased selection:bg-[#8B5CF6] selection:text-white">
    
    <div class="w-full max-w-md">
      
      <!-- Back Link -->
      <div class="mb-6">
        <a href="/index.html" class="inline-flex items-center gap-2 text-xs font-semibold text-[#9CA3AF] hover:text-[#8B5CF6] transition-colors leading-none">
          <i data-lucide="arrow-left" class="w-4 h-4"></i>
          <span>Back to Gallery</span>
        </a>
      </div>

      <!-- Main Login Container -->
      <div class="p-8 sm:p-10 rounded-2xl sm:rounded-3xl bg-[#1A1A22] border border-white/10 shadow-2xl relative overflow-hidden">
        
        <!-- Glowing Top Border Accent -->
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-[#8B5CF6] to-transparent pulse-glow"></div>

        <!-- Header -->
        <div class="text-center mb-8">
          <div class="w-12 h-12 rounded-xl overflow-hidden shadow-lg shadow-[#8B5CF6]/30 border border-[#8B5CF6]/30 bg-[#1A1A22] flex items-center justify-center mx-auto mb-4">
            <img src="/src/assets/images/site_logo_1781200506583.jpg" alt="AI Prompt Gallery Logo" class="w-full h-full object-cover" referrerpolicy="no-referrer">
          </div>
          <h1 id="authTitle" class="text-2xl font-bold tracking-tight text-[#F3F4F6] mb-1.5">Authorized Portal</h1>
          <p id="authSubtitle" class="text-xs text-[#9CA3AF]">Please sign in using your admin credentials</p>
        </div>

        <!-- Auth Alert Message -->
        <div id="authAlert" class="hidden flex items-start gap-2.5 p-3 rounded-xl border mb-6 text-xs font-medium">
          <!-- Populated by JS -->
        </div>

        <!-- Action Form -->
        <form id="authForm" class="space-y-5">
          
          <!-- Email Field -->
          <div class="space-y-1.5 text-left">
            <label for="emailInput" class="text-xs font-semibold tracking-wider uppercase text-[#9CA3AF] block">Email Address</label>
            <div class="relative flex items-center bg-white/5 border border-white/5 focus-within:border-[#8B5CF6]/45 focus-within:bg-[#0F0F12] rounded-xl transition-all duration-200">
              <i data-lucide="mail" class="absolute left-3.5 w-4 h-4 text-[#9CA3AF]"></i>
              <input 
                type="email" 
                id="emailInput" 
                required
                placeholder="admin@example.com" 
                class="w-full pl-10 pr-4 py-3 bg-transparent outline-none text-[#F3F4F6] text-sm placeholder-[#9CA3AF]/30 rounded-xl"
              />
            </div>
          </div>

          <!-- Password Field -->
          <div class="space-y-1.5 text-left">
            <label for="passwordInput" class="text-xs font-semibold tracking-wider uppercase text-[#9CA3AF] block">Password</label>
            <div class="relative flex items-center bg-white/5 border border-white/5 focus-within:border-[#8B5CF6]/45 focus-within:bg-[#0F0F12] rounded-xl transition-all duration-200">
              <i data-lucide="key-round" class="absolute left-3.5 w-4 h-4 text-[#9CA3AF]"></i>
              <input 
                type="password" 
                id="passwordInput" 
                required
                placeholder="••••••••••••" 
                class="w-full pl-10 pr-4 py-3 bg-transparent outline-none text-[#F3F4F6] text-sm placeholder-[#9CA3AF]/30 rounded-xl"
              />
            </div>
          </div>

          <!-- Submit Button -->
          <button 
            type="submit" 
            id="submitBtn"
            class="w-full flex items-center justify-center gap-2 px-6 py-3.5 bg-[#8B5CF6] hover:bg-[#7C3AED] active:scale-95 text-white font-medium rounded-xl shadow-lg shadow-[#8B5CF6]/20 transition-all duration-200 cursor-pointer text-sm sm:text-base"
          >
            <span id="submitBtnText">Sign In</span>
            <i data-lucide="arrow-right" class="w-4 h-4 text-white"></i>
          </button>

        </form>

        <!-- Dynamic View Toggle -->
        <div class="mt-8 pt-6 border-t border-white/5 text-center text-xs">
          <p class="text-[#9CA3AF]" id="togglePrompt">
            No administrator registered yet? 
            <button id="toggleAuthModeBtn" class="text-[#8B5CF6] hover:underline hover:text-[#A78BFA] font-bold ml-1 cursor-pointer">
              Register Admin
            </button>
          </p>
        </div>

      </div>

    </div>

    <!-- Active Loading Overlay (during submission) -->
    <div id="authLoadingOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-100 hidden items-center justify-center">
      <div class="flex flex-col items-center gap-3">
        <div class="w-10 h-10 border-4 border-[#8B5CF6] border-t-transparent rounded-full animate-spin"></div>
        <span class="text-xs font-bold text-[#F3F4F6] tracking-widest uppercase">Verifying Key...</span>
      </div>
    </div>

    <!-- Script connection -->
    <script type="module" src="./admin.js"></script>
  </body>
</html>
